<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>加拿大28预测</title>
    <style>
        *{box-sizing:border-box;font-family:system-ui}
        body{background:#1a2a3f;margin:0;padding:20px}
        .card{max-width:600px;margin:0 auto;background:white;border-radius:32px;padding:20px}
        input{width:60px;height:60px;font-size:24px;text-align:center;margin:5px;border-radius:16px;border:1px solid #ccc}
        button{background:#f7b32b;border:none;padding:12px;border-radius:40px;font-weight:bold;margin:10px 5px}
        .big{font-size:48px;font-weight:bold;text-align:center}
        .result{background:#eef2fa;border-radius:24px;padding:16px;margin-top:16px}
    </style>
</head>
<body>
<div class="card">
    <h2>🇨🇦 加拿大28 三期预测</h2>
    <div id="inputs"></div>
    <button onclick="calc()">🔮 预测</button>
    <button onclick="resetDemo()">🔄 重置</button>
    <div class="result">
        <div class="big" id="final">--</div>
        <div id="group"></div>
        <div id="steps" style="font-size:12px"></div>
    </div>
</div>
<script>
    const demo = {
        p1:[7,5,3], s1:15,
        p2:[9,8,6], s2:23,
        p3:[8,9,7], s3:24,
        h:21, m:7
    };
    function renderInputs(){
        let html='<h3>第一期(早)</h3>';
        for(let i=0;i<3;i++) html+=`<input id="a${i}" value="${demo.p1[i]}" type="number" min="0" max="9">`;
        html+=`<div>和值<input id="s1" value="${demo.s1}" type="number" min="0" max="27"></div>`;
        html+='<h3>第二期(中)</h3>';
        for(let i=0;i<3;i++) html+=`<input id="b${i}" value="${demo.p2[i]}" type="number" min="0" max="9">`;
        html+=`<div>和值<input id="s2" value="${demo.s2}" type="number" min="0" max="27"></div>`;
        html+='<h3>第三期(最新)</h3>';
        for(let i=0;i<3;i++) html+=`<input id="c${i}" value="${demo.p3[i]}" type="number" min="0" max="9">`;
        html+=`<div>和值<input id="s3" value="${demo.s3}" type="number" min="0" max="27"></div>`;
        html+='<h3>时间系数</h3>';
        html+=`<input id="h" value="${demo.h}" type="number" min="0" max="23" style="width:80px">时 <input id="m" value="${demo.m}" type="number" min="0" max="59" style="width:80px">分`;
        document.getElementById('inputs').innerHTML=html;
    }
    function val(id){return parseInt(document.getElementById(id).value)||0;}
    function calc(){
        const p1=[val('a0'),val('a1'),val('a2')];
        const p2=[val('b0'),val('b1'),val('b2')];
        const p3=[val('c0'),val('c1'),val('c2')];
        const sums=[val('s1'),val('s2'),val('s3')];
        const abc1=parseInt(`${p3[0]}${p2[0]}${p1[0]}`);
        const abc2=parseInt(`${p3[1]}${p2[1]}${p1[1]}`);
        const abc3=parseInt(`${p3[2]}${p2[2]}${p1[2]}`);
        const dividend=abc1+abc2+abc3;
        const divisor=sums[0]+sums[1]+sums[2];
        const divRes=divisor===0?0:dividend/divisor;
        const coef=val('h')+val('m')/100;
        const mulRes=Math.floor(divRes)*coef;
        let final=Math.floor(dividend-mulRes);
        if(final<0)final=0;
        const isSmall=(final>=0&&final<=13)||(final>=28&&final<=49);
        document.getElementById('final').innerText=final;
        document.getElementById('group').innerHTML=isSmall?'🔻 小区域 (0-13,28-49)':'🔺 大区域 (14-27,50-99)';
        document.getElementById('steps').innerHTML=`abc1=${abc1} abc2=${abc2} abc3=${abc3} | dividend=${dividend} divisor=${divisor} | floor(divRes)=${Math.floor(divRes)} coef=${coef.toFixed(4)} mulRes=${mulRes.toFixed(2)}`;
    }
    function resetDemo(){
        for(let i=0;i<3;i++){
            document.getElementById(`a${i}`).value=demo.p1[i];
            document.getElementById(`b${i}`).value=demo.p2[i];
            document.getElementById(`c${i}`).value=demo.p3[i];
        }
        document.getElementById('s1').value=demo.s1;
        document.getElementById('s2').value=demo.s2;
        document.getElementById('s3').value=demo.s3;
        document.getElementById('h').value=demo.h;
        document.getElementById('m').value=demo.m;
        calc();
    }
    renderInputs();
    calc();
</script>
</body>
</html>
